<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini's Homely Masalas — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:#FAF3E8; --gold:#C8832A; --gold-light:#F2E0C4; --red:#A33B2A;
    --green:#4A7C5F; --green-light:#E4F0E8; --amber:#D4870F; --amber-light:#FDF0D5;
    --red-light:#FAEAE7; --ink:#1C1008; --muted:#7A6652; --card:#FFFFFF; --border:#E8D9C4;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--cream);font-family:'Inter',sans-serif;color:var(--ink);min-height:100vh;}

  header{background:var(--ink);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  .hdr-left h1{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.3rem;}
  .hdr-left #last-updated{color:#9E8B78;font-size:0.7rem;margin-top:3px;}
  .hdr-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .hdr-right #today-date{color:#9E8B78;font-size:0.72rem;}
  .btn-sheet{color:rgba(255,255,255,0.85);font-size:0.72rem;font-weight:600;text-decoration:none;
    border:1px solid rgba(255,255,255,0.3);border-radius:5px;padding:6px 12px;transition:background 0.15s;}
  .btn-sheet:hover{background:rgba(255,255,255,0.1);}
  .btn-refresh{background:var(--gold);color:white;border:none;border-radius:5px;padding:7px 14px;
    font-size:0.72rem;font-weight:600;cursor:pointer;transition:background 0.15s;}
  .btn-refresh:hover{background:#a8691f;}
  .btn-refresh:disabled{opacity:0.6;cursor:not-allowed;}

  nav.tabs{background:#2A1810;display:flex;gap:2px;padding:0 20px;overflow-x:auto;position:sticky;top:0;z-index:50;
    -webkit-overflow-scrolling:touch;}
  nav.tabs button{background:transparent;border:none;color:#C9B8A6;font-family:'Inter',sans-serif;
    font-size:0.8rem;font-weight:600;padding:13px 16px;cursor:pointer;white-space:nowrap;
    border-bottom:3px solid transparent;transition:all 0.15s;}
  nav.tabs button:hover{color:var(--gold-light);}
  nav.tabs button.active{color:var(--gold);border-bottom-color:var(--gold);}

  .container{max-width:1100px;margin:0 auto;padding:22px 16px 48px;}
  .panel{display:none;}
  .panel.active{display:block;}

  .section-title{font-family:'Playfair Display',serif;font-size:1.02rem;color:var(--ink);
    margin-bottom:13px;padding-bottom:6px;border-bottom:2px solid var(--gold-light);
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .section-title .badge{background:var(--gold);color:white;font-family:'Inter',sans-serif;
    font-size:0.66rem;font-weight:600;padding:2px 8px;border-radius:20px;}
  .section{margin-bottom:32px;}

  .loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:0.9rem;}
  .spinner{width:34px;height:34px;border:3px solid var(--gold-light);border-top-color:var(--gold);
    border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .error-msg{background:var(--red-light);border-left:4px solid var(--red);padding:12px 16px;
    border-radius:6px;color:var(--red);font-size:0.8rem;margin-bottom:16px;}
  .empty{color:var(--muted);font-size:0.8rem;font-style:italic;padding:10px 0;}

  .cards-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px;}
  .kpi-card{background:var(--card);border-radius:10px;padding:14px 13px;
    border-left:4px solid var(--gold);box-shadow:0 1px 4px rgba(28,16,8,0.07);}
  .kpi-label{font-size:0.65rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);margin-bottom:5px;}
  .kpi-value{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--ink);line-height:1.1;}
  .kpi-sub{font-size:0.65rem;color:var(--muted);margin-top:3px;}

  .table-wrap{overflow-x:auto;border-radius:10px;box-shadow:0 1px 4px rgba(28,16,8,0.07);}
  table{width:100%;border-collapse:collapse;background:var(--card);font-size:0.8rem;}
  thead tr{background:var(--ink);}
  thead th{color:var(--gold-light);font-weight:600;font-size:0.65rem;text-transform:uppercase;
    letter-spacing:0.04em;padding:9px 12px;text-align:left;white-space:nowrap;}
  tbody tr{border-bottom:1px solid var(--border);}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:#FDF8F2;}
  tbody td{padding:9px 12px;vertical-align:middle;}

  .pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:0.66rem;font-weight:600;white-space:nowrap;}
  .pill-green{background:var(--green-light);color:var(--green);}
  .pill-amber{background:var(--amber-light);color:var(--amber);}
  .pill-red{background:var(--red-light);color:var(--red);}

  .pending-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .sub-title{font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;
    color:var(--muted);margin-bottom:9px;}
  .pending-total{text-align:right;margin-top:7px;font-weight:600;color:var(--red);font-size:0.8rem;}

  .filter-pills{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .filter-pill{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:8px 16px;
    font-size:0.76rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all 0.15s;}
  .filter-pill.active{background:var(--gold);color:white;border-color:var(--gold);}

  .filter-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .filter-row select{flex:1;min-width:150px;padding:9px 12px;border-radius:8px;border:1px solid var(--border);
    font-family:'Inter',sans-serif;font-size:0.82rem;background:var(--card);color:var(--ink);}

  .view-history-link{color:var(--gold);font-weight:600;font-size:0.74rem;cursor:pointer;
    text-decoration:underline;white-space:nowrap;}
  .history-row{display:none;}
  .history-row.open{display:table-row;}
  .history-cell{background:#FDF8F2 !important;padding:14px !important;}
  .history-summary{display:flex;gap:22px;margin-bottom:12px;flex-wrap:wrap;}
  .history-summary .hs-label{display:block;font-size:0.63rem;text-transform:uppercase;color:var(--muted);font-weight:600;letter-spacing:0.04em;}
  .history-summary .hs-value{display:block;font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--ink);margin-top:2px;}
  .interval-note{font-size:0.7rem;color:var(--muted);margin:6px 0 18px;font-style:italic;}

  @media(max-width:700px){
    .pending-grid{grid-template-columns:1fr;}
    nav.tabs{padding:0 8px;}
    header{padding:12px 16px;}
    .hdr-left h1{font-size:1.1rem;}
    .container{padding:16px 12px 40px;}

    .responsive-table thead{display:none;}
    .responsive-table, .responsive-table tbody, .responsive-table tr{display:block;width:100%;}
    .responsive-table tr{margin-bottom:10px;border:1px solid var(--border);border-radius:10px;
      padding:6px 12px;background:var(--card);}
    .responsive-table td{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;
      padding:7px 0;border-bottom:1px dashed var(--border);text-align:right;font-size:0.8rem;}
    .responsive-table td:last-child{border-bottom:none;}
    .responsive-table td::before{content:attr(data-label);font-weight:600;color:var(--muted);
      text-align:left;font-size:0.63rem;text-transform:uppercase;letter-spacing:0.03em;flex-shrink:0;}
    .responsive-table td.no-label::before{content:none;}
    .responsive-table td.no-label{justify-content:flex-end;}
    .responsive-table td.history-cell{display:block;text-align:left;}
    .responsive-table td.history-cell::before{content:none;}
    .history-row.open{display:block !important;}
  }
</style>
</head>
<body>

<header>
  <div class="hdr-left">
    <h1>🫙 Mini's Homely Masalas</h1>
    <div id="last-updated">Loading…</div>
  </div>
  <div class="hdr-right">
    <span id="today-date"></span>
    <a class="btn-sheet" href="https://docs.google.com/spreadsheets/d/1bVYNM1QZnivCm-LybdW6ktaH8JDzzYWtz3XaD7Zq7O0/edit" target="_blank">✏️ Edit Sheet</a>
    <button class="btn-refresh" id="refreshBtn" onclick="init()">⟳ Refresh</button>
  </div>
</header>

<nav class="tabs">
  <button data-tab="operations" class="active" onclick="switchTab('operations')">📋 Operations</button>
  <button data-tab="mis" onclick="switchTab('mis')">📊 MIS</button>
  <button data-tab="customers" onclick="switchTab('customers')">👥 Customers</button>
  <button data-tab="products" onclick="switchTab('products')">🧂 Products</button>
  <button data-tab="history" onclick="switchTab('history')">🧾 Order History</button>
</nav>

<div class="container" id="app">
  <div class="loading"><div class="spinner"></div>Fetching from Google Sheets…</div>
</div>

<script>
/* ===================== CONFIG ===================== */
const BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS10Pxvujhj60pRw55jBG9TDmDVzJ2jYF8NpFg0x5zWYteG03IzNQCqnBteN_fB-4r1xeymFNisl7Hu/pub';
const SHEET_TABS = {
  customers: BASE + '?gid=0&single=true&output=csv',
  products:  BASE + '?gid=1428094373&single=true&output=csv',
  orders:    BASE + '?gid=718714399&single=true&output=csv',
  settings:  BASE + '?gid=1019938917&single=true&output=csv'
};

const today = new Date(); today.setHours(0,0,0,0);
let DATA = {};

/* ===================== HELPERS ===================== */
function fmtDate(d){ if(!d||isNaN(d))return'—'; return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); }
function parseDate(s){
  if(!s||!s.trim())return null; s=s.trim();
  let p;
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)){p=new Date(s);}
  else if(/^\d{2}[\/\-]\d{2}[\/\-]\d{4}$/.test(s)){const[dd,mm,yy]=s.split(/[\/\-]/);p=new Date(`${yy}-${mm}-${dd}`);}
  else{p=new Date(s);}
  return isNaN(p)?null:(p.setHours(0,0,0,0),p);
}
function diffDays(from,to){return Math.round((to-from)/86400000);}
function monthKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function monthLabel(key){const[y,m]=key.split('-');return new Date(y,m-1,1).toLocaleString('en-IN',{month:'long',year:'numeric'});}
function pill(label,type){return`<span class="pill pill-${type}">${label}</span>`;}
function pct(n){return isFinite(n)?n.toFixed(0)+'%':'—';}
function inr(n){return isFinite(n)?'₹'+n.toFixed(0):'—';}
function parsePct(s){ if(!s) return 0; return parseFloat(String(s).replace('%',''))||0; }

function kpiCard(label,value,opts={}){
  const bStyle=opts.color?` style="border-left-color:var(--${opts.color})"`:'';
  const vStyle=opts.color?` style="color:var(--${opts.color})"`:'';
  return `<div class="kpi-card"${bStyle}><div class="kpi-label">${label}</div><div class="kpi-value"${vStyle}>${value}</div>${opts.sub?`<div class="kpi-sub">${opts.sub}</div>`:''}</div>`;
}
function kpiRow(...cards){ return `<div class="cards-row">${cards.join('')}</div>`; }

function renderTable(headers, rows, opts={}){
  if(rows.length===0) return `<div class="empty">${opts.emptyText||'No data.'}</div>`;
  const thead='<tr>'+headers.map(h=>`<th>${h}</th>`).join('')+'</tr>';
  const tbody=rows.map(cells=>'<tr>'+cells.map((c,i)=>`<td data-label="${headers[i]}">${c}</td>`).join('')+'</tr>').join('');
  return `<div class="table-wrap"><table class="responsive-table"><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
}

async function fetchCSV(rawUrl){
  const url = rawUrl + '&t=' + Date.now();
  let text = null;
  try{
    const r = await fetch('https://corsproxy.io/?' + encodeURIComponent(url));
    if(r.ok) text = await r.text();
  }catch(e){}
  if(!text){
    try{
      const r = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url));
      if(r.ok){const j=await r.json(); text=j.contents;}
    }catch(e){}
  }
  if(!text) throw new Error('Both proxies failed for: ' + rawUrl);
  return parseCSV(text);
}
function parseCSV(text){
  const lines=text.trim().split('\n');
  const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).filter(l=>l.trim()).map(line=>{
    const vals=[]; let cur='',inQ=false;
    for(const ch of line){
      if(ch==='"'){inQ=!inQ;}
      else if(ch===','&&!inQ){vals.push(cur.trim());cur='';}
      else cur+=ch;
    }
    vals.push(cur.trim());
    const obj={};
    headers.forEach((h,i)=>obj[h]=(vals[i]||'').replace(/^"|"$/g,'').trim());
    return obj;
  });
}

function buildPriceMap(products){
  const map={};
  products.forEach(p=>{
    map[p['Name'].toLowerCase()]={
      price: parseFloat(p['Price'])||0,
      packSize: parseFloat(p['Pack Size'])||1,
      marginPct: parsePct(p['Margin %'])
    };
  });
  return map;
}
function lineAmount(o,priceMap){
  const pm=priceMap[o['Product Name'].toLowerCase()];
  if(!pm||!pm.packSize) return 0;
  return ((parseFloat(o['Qty'])||0)/pm.packSize)*pm.price;
}
function lineProfit(o,priceMap){
  const pm=priceMap[o['Product Name'].toLowerCase()];
  if(!pm) return 0;
  return lineAmount(o,priceMap) * (pm.marginPct/100);
}
function isLoyalRow(c){
  for(const k in c){
    if(k.toLowerCase().includes('loyal')) return (c[k]||'').trim().toUpperCase().startsWith('Y');
  }
  return false;
}
function getSettingByKeyword(keyword){
  const row=(DATA.settings||[]).find(s=>(s['Setting Name']||'').toLowerCase().includes(keyword));
  return row ? row['Value'] : null;
}
function distinctOrderCount(orders){
  return new Set(orders.map(o=>o['Order Id']).filter(Boolean)).size;
}

/* ===================== CUSTOMER ORDER HISTORY (shared) ===================== */
function buildCustomerHistoryHTML(name,priceMap){
  let custOrders=DATA.orders.filter(o=>o['Customer Name'].toLowerCase()===name.toLowerCase());
  custOrders.sort((a,b)=>{
    const da=parseDate(a['Order Date']), db=parseDate(b['Order Date']);
    return (db?db.getTime():0)-(da?da.getTime():0);
  });
  const totalOrders=distinctOrderCount(custOrders);
  const totalRevenue=custOrders.reduce((s,o)=>s+lineAmount(o,priceMap),0);
  const lastDate=custOrders.length?parseDate(custOrders[0]['Order Date']):null;

  const summary=`<div class="history-summary">
    <div><span class="hs-label">Total Orders</span><span class="hs-value">${totalOrders}</span></div>
    <div><span class="hs-label">Total Revenue</span><span class="hs-value">${inr(totalRevenue)}</span></div>
    <div><span class="hs-label">Last Order</span><span class="hs-value">${lastDate?fmtDate(lastDate):'—'}</span></div>
  </div>`;

  const rows=custOrders.map(o=>{
    const paid=(o['Payment Date']&&o['Payment Date'].trim())?pill('Paid','green'):pill('Pending','amber');
    return[o['Order Id']||'—',o['Product Name'],o['Qty'],fmtDate(parseDate(o['Order Date'])),fmtDate(parseDate(o['Delivery Date'])),paid,inr(lineAmount(o,priceMap))];
  });
  const table=renderTable(['Order Id','Product','Qty','Order Date','Delivery Date','Payment','Amount'],rows,{emptyText:'No orders yet for this customer.'});
  return summary+table;
}

let historyIdCounter=0;
function toggleHistory(idx){
  const row=document.getElementById('hist-'+idx);
  const link=document.getElementById('hist-link-'+idx);
  if(!row) return;
  const nowOpen=row.classList.toggle('open');
  if(link) link.textContent = nowOpen ? 'Hide' : link.dataset.label;
}

/* ===================== TAB: OPERATIONS ===================== */
function computeReminderRows(customers,orders,priceMap){
  const interval=parseInt(getSettingByKeyword('interval'))||15;
  const loyalCustomers=customers.filter(isLoyalRow);
  const rows=[];
  loyalCustomers.forEach(c=>{
    const name=c['Name'];
    const custOrders=orders.filter(o=>o['Customer Name'].toLowerCase()===name.toLowerCase());
    let lastOrderDate=null;
    custOrders.forEach(o=>{
      const d=parseDate(o['Order Date']);
      if(d&&(!lastOrderDate||d>lastOrderDate)) lastOrderDate=d;
    });
    const totalRevenue=custOrders.reduce((s,o)=>s+lineAmount(o,priceMap),0);
    let daysSince=null,status,statusType;
    if(!lastOrderDate){status='No Orders Yet';statusType='amber';}
    else{
      daysSince=diffDays(lastOrderDate,today);
      if(daysSince>=interval*2){status='Overdue';statusType='red';}
      else if(daysSince>=interval){status='Due';statusType='amber';}
      else{status='On Track';statusType='green';}
    }
    rows.push({name,phone:c['Phone'],lastOrderDate,daysSince,status,statusType,totalRevenue});
  });
  const rank={'Overdue':0,'No Orders Yet':1,'Due':2,'On Track':3};
  rows.sort((a,b)=>(rank[a.status]-rank[b.status])||((b.daysSince||0)-(a.daysSince||0)));
  return{rows,interval};
}

function renderReminderTracker(priceMap){
  const{rows,interval}=computeReminderRows(DATA.customers,DATA.orders,priceMap);
  if(rows.length===0) return{html:'<div class="empty">No loyal customers marked yet. Mark customers as Loyal in the Customers sheet.</div>',dueCount:0,overdueCount:0};

  const headers=['Customer','Phone','Last Order','Days Since','Lifetime Value','Status',''];
  const thead='<tr>'+headers.map(h=>`<th>${h}</th>`).join('')+'</tr>';
  const bodyRows=rows.map(r=>{
    const idx=historyIdCounter++;
    const daysDisplay=r.daysSince===null?'—':r.daysSince+'d';
    const mainRow=`<tr>
      <td data-label="Customer"><strong>${r.name}</strong></td>
      <td data-label="Phone">${r.phone||'—'}</td>
      <td data-label="Last Order">${r.lastOrderDate?fmtDate(r.lastOrderDate):'—'}</td>
      <td data-label="Days Since">${daysDisplay}</td>
      <td data-label="Lifetime Value">${inr(r.totalRevenue)}</td>
      <td data-label="Status">${pill(r.status,r.statusType)}</td>
      <td data-label="" class="no-label"><a class="view-history-link" id="hist-link-${idx}" data-label="View History" onclick="toggleHistory(${idx})">View History</a></td>
    </tr>`;
    const detailRow=`<tr class="history-row" id="hist-${idx}"><td colspan="7" class="history-cell">${buildCustomerHistoryHTML(r.name,priceMap)}</td></tr>`;
    return mainRow+detailRow;
  }).join('');

  const dueCount=rows.filter(r=>r.status==='Due'||r.status==='No Orders Yet').length;
  const overdueCount=rows.filter(r=>r.status==='Overdue').length;

  const html=`<div class="table-wrap"><table class="responsive-table"><thead>${thead}</thead><tbody>${bodyRows}</tbody></table></div>
    <div class="interval-note">Check-in interval: every ${interval} days · overdue after ${interval*2} days (set in Settings sheet)</div>`;

  return{html,dueCount,overdueCount};
}

function renderOperations(){
  const{customers,products,orders}=DATA;
  const priceMap=buildPriceMap(products);
  const{html:trackerHTML,dueCount,overdueCount}=renderReminderTracker(priceMap);

  const pendingDel=orders.filter(o=>o['Order Date']&&o['Order Date'].trim()&&(!o['Delivery Date']||!o['Delivery Date'].trim()));
  const pendingPay=orders.filter(o=>!o['Payment Date']||!o['Payment Date'].trim());
  const pendingPayTotal=pendingPay.reduce((s,o)=>s+lineAmount(o,priceMap),0);

  const kpis=kpiRow(
    kpiCard('Due for Check-in',dueCount,{sub:'reach out this week'}),
    kpiCard('Overdue',overdueCount,{color:'red',sub:'gone quiet'}),
    kpiCard('Pending Deliveries',pendingDel.length,{sub:'not yet dispatched'}),
    kpiCard('Pending Payments',pendingPay.length,{color:'red',sub:inr(pendingPayTotal)+' outstanding'})
  );

  const delivRows=pendingDel.map(o=>[`<strong>${o['Customer Name']}</strong>`,o['Product Name'],o['Qty'],fmtDate(parseDate(o['Order Date']))]);
  const delivHTML=renderTable(['Customer','Product','Qty','Order Date'],delivRows,{emptyText:'No pending deliveries.'});

  const payRows=pendingPay.map(o=>{
    const od=parseDate(o['Order Date']); const days=od?diffDays(od,today):'?'; const a=lineAmount(o,priceMap);
    const daysHTML=(typeof days==='number'&&days>14)?`<span style="color:var(--red)">${days}d</span>`:days+'d';
    return[`<strong>${o['Customer Name']}</strong>`,o['Product Name'],o['Qty'],fmtDate(od),a>0?inr(a):'—',daysHTML];
  });
  let payHTML=renderTable(['Customer','Product','Qty','Order Date','Amount','Days Pending'],payRows,{emptyText:'No pending payments. 💚'});
  if(pendingPay.length>0) payHTML+=`<div class="pending-total">Total Pending: ${inr(pendingPayTotal)}</div>`;

  return `${kpis}
    <div class="section"><div class="section-title">📞 Loyal Customer Check-ins <span class="badge">${overdueCount+dueCount} need attention</span></div>${trackerHTML}</div>
    <div class="section"><div class="section-title">📦 Pending Orders & Payments</div>
      <div class="pending-grid">
        <div><div class="sub-title">🚚 Pending Deliveries (${pendingDel.length})</div>${delivHTML}</div>
        <div><div class="sub-title">💰 Pending Payments (${pendingPay.length})</div>${payHTML}</div>
      </div>
    </div>`;
}

/* ===================== TAB: MIS ===================== */
function buildMonthCustomerBreakdownHTML(key,priceMap,loyalSet){
  const monthOrders=DATA.orders.filter(o=>{
    const d=parseDate(o['Order Date']);
    return d && monthKey(d)===key;
  });
  const byCust={};
  monthOrders.forEach(o=>{
    const name=o['Customer Name'];
    if(!loyalSet.has(name.toLowerCase())) return;
    if(!byCust[name]) byCust[name]={revenue:0,profit:0,orderIds:new Set()};
    byCust[name].revenue+=lineAmount(o,priceMap);
    byCust[name].profit+=lineProfit(o,priceMap);
    if(o['Order Id']) byCust[name].orderIds.add(o['Order Id']);
  });
  const entries=Object.entries(byCust).sort((a,b)=>b[1].revenue-a[1].revenue);
  const rows=entries.map(([name,d])=>{
    const aov=d.orderIds.size>0?d.revenue/d.orderIds.size:0;
    return[`<strong>${name}</strong>`,inr(d.revenue),inr(d.profit),inr(aov)];
  });
  return renderTable(['Customer','Revenue','Profit','Avg Order Value'],rows,{emptyText:'No loyal customer orders this month.'});
}

function renderMIS(){
  const{orders,products,customers}=DATA;
  const priceMap=buildPriceMap(products);
  const loyalSet=new Set(customers.filter(isLoyalRow).map(c=>c['Name'].toLowerCase()));
  const loyalCount=customers.filter(isLoyalRow).length;

  const targetProfit=parseFloat(getSettingByKeyword('target'))||0;
  const targetRevenue=targetProfit*2;
  const targetAOV=loyalCount>0?(0.8*targetRevenue)/loyalCount:0;

  const monthly={};
  orders.forEach(o=>{
    const d=parseDate(o['Order Date']);
    if(!d) return;
    const key=monthKey(d);
    if(!monthly[key]) monthly[key]={revenue:0,profit:0,loyalRev:0,nonLoyalRev:0,orderIds:new Set()};
    const amt=lineAmount(o,priceMap), prof=lineProfit(o,priceMap);
    monthly[key].revenue+=amt; monthly[key].profit+=prof;
    if(loyalSet.has((o['Customer Name']||'').toLowerCase())) monthly[key].loyalRev+=amt;
    else monthly[key].nonLoyalRev+=amt;
    if(o['Order Id']) monthly[key].orderIds.add(o['Order Id']);
  });

  const keys=Object.keys(monthly).sort().reverse();
  const cur=monthly[monthKey(today)];
  const curLoyalPct=cur&&cur.revenue>0?(cur.loyalRev/cur.revenue)*100:0;
  const curNonLoyalPct=cur&&cur.revenue>0?(cur.nonLoyalRev/cur.revenue)*100:0;

  const kpis=kpiRow(
    kpiCard('Target Monthly Profit',targetProfit>0?inr(targetProfit):'—'),
    kpiCard('Target Monthly AOV',targetAOV>0?inr(targetAOV):'—',{sub:loyalCount+' loyal customers'}),
    kpiCard('Revenue Split','',{sub:`${pct(curLoyalPct)} loyal · ${pct(curNonLoyalPct)} others`})
  );
  const footnote=`<div class="interval-note">Target AOV = 80% of (2× Target Monthly Profit) ÷ number of loyal customers — a simple planning estimate assuming roughly half of revenue is profit, and most revenue comes from loyal customers.</div>`;

  let trendHTML;
  if(keys.length===0){
    trendHTML='<div class="empty">No order data yet to build monthly trends.</div>';
  } else {
    const headers=['Month','Revenue','Actual Profit','Avg Order Value','Loyal Revenue %','Non-Loyal Revenue %',''];
    const thead='<tr>'+headers.map(h=>`<th>${h}</th>`).join('')+'</tr>';
    const bodyRows=keys.map(k=>{
      const m=monthly[k];
      const aov=m.orderIds.size>0?m.revenue/m.orderIds.size:0;
      const lp=m.revenue>0?(m.loyalRev/m.revenue)*100:0;
      const nlp=m.revenue>0?(m.nonLoyalRev/m.revenue)*100:0;
      const idx=historyIdCounter++;
      const mainRow=`<tr>
        <td data-label="Month"><strong>${monthLabel(k)}</strong></td>
        <td data-label="Revenue">${inr(m.revenue)}</td>
        <td data-label="Actual Profit">${inr(m.profit)}</td>
        <td data-label="Avg Order Value">${inr(aov)}</td>
        <td data-label="Loyal Revenue %">${pct(lp)}</td>
        <td data-label="Non-Loyal Revenue %">${pct(nlp)}</td>
        <td data-label="" class="no-label"><a class="view-history-link" id="hist-link-${idx}" data-label="View Breakdown" onclick="toggleHistory(${idx})">View Breakdown</a></td>
      </tr>`;
      const breakdown=buildMonthCustomerBreakdownHTML(k,priceMap,loyalSet);
      const detailRow=`<tr class="history-row" id="hist-${idx}"><td colspan="7" class="history-cell">${breakdown}</td></tr>`;
      return mainRow+detailRow;
    }).join('');
    trendHTML=`<div class="table-wrap"><table class="responsive-table"><thead>${thead}</thead><tbody>${bodyRows}</tbody></table></div>`;
  }

  return `${kpis}${footnote}<div class="section"><div class="section-title">📈 Monthly Trend</div>${trendHTML}</div>`;
}

/* ===================== TAB: CUSTOMERS ===================== */
function renderCustomers(){
  const{customers,orders}=DATA;
  const cutoff=new Date(today); cutoff.setDate(cutoff.getDate()-60);
  const activeSet=new Set(orders.filter(o=>{const d=parseDate(o['Order Date']);return d&&d>=cutoff;}).map(o=>o['Customer Name'].toLowerCase()));
  const loyalCount=customers.filter(isLoyalRow).length;

  const kpis=kpiRow(
    kpiCard('Total Customers',customers.length),
    kpiCard('Loyal Customers',loyalCount,{color:'gold'}),
    kpiCard('Active (60 days)',activeSet.size,{color:'green'})
  );

  return `${kpis}<div class="section"><div class="section-title">👥 All Customers</div>
    <div class="filter-pills">
      <button class="filter-pill active" data-filter="all" onclick="filterCustomersTable('all')">All</button>
      <button class="filter-pill" data-filter="loyal" onclick="filterCustomersTable('loyal')">Loyal</button>
      <button class="filter-pill" data-filter="others" onclick="filterCustomersTable('others')">Others</button>
    </div>
    <div id="customersResults"></div>
  </div>`;
}
function filterCustomersTable(filter){
  document.querySelectorAll('.filter-pill').forEach(b=>b.classList.toggle('active',b.dataset.filter===filter));
  let list=DATA.customers;
  if(filter==='loyal') list=list.filter(isLoyalRow);
  if(filter==='others') list=list.filter(c=>!isLoyalRow(c));
  const rows=list.map(c=>[c['Sr No'],`<strong>${c['Name']}</strong>`,c['Address'],c['City'],c['Phone'],isLoyalRow(c)?pill('Loyal','green'):'—',c['Notes']]);
  const resultsEl=document.getElementById('customersResults');
  if(resultsEl) resultsEl.innerHTML=renderTable(['Sr No','Name','Address','City','Phone','Loyal','Notes'],rows,{emptyText:'No customers in this filter.'});
}

/* ===================== TAB: PRODUCTS ===================== */
function renderProducts(){
  const{products,orders}=DATA;
  const priceMap=buildPriceMap(products);
  const monthStart=new Date(today.getFullYear(),today.getMonth(),1);

  const revByProduct={};
  orders.forEach(o=>{
    const d=parseDate(o['Order Date']);
    if(!d||d<monthStart) return;
    revByProduct[o['Product Name']]=(revByProduct[o['Product Name']]||0)+lineAmount(o,priceMap);
  });
  let topProduct='—',topVal=0;
  Object.entries(revByProduct).forEach(([name,val])=>{if(val>topVal){topVal=val;topProduct=name;}});

  const kpis=kpiRow(
    kpiCard('Total Products',products.length),
    kpiCard('Top Seller This Month',topProduct,{sub:topVal>0?inr(topVal)+' revenue':'no sales yet'})
  );

  const rows=products.map(p=>[p['Sr No'],p['Category'],`<strong>${p['Name']}</strong>`,p['Pack Size'],p['Price']?inr(parseFloat(p['Price'])):'—',p['Margin %']||'—',p['Seasonal'],p['Notes']]);
  const tableHTML=renderTable(['Sr No','Category','Name','Pack Size','Price','Margin %','Seasonal','Notes'],rows,{emptyText:'No products added yet.'});

  return `${kpis}<div class="section"><div class="section-title">🧂 All Products</div>${tableHTML}</div>`;
}

/* ===================== TAB: ORDER HISTORY ===================== */
function renderOrderHistoryTab(){
  const{customers,products}=DATA;
  const custOptions=['<option value="">All Customers</option>'].concat(
    customers.map(c=>`<option value="${c['Name']}">${c['Name']}</option>`)).join('');
  const prodOptions=['<option value="">All Products</option>'].concat(
    products.map(p=>`<option value="${p['Name']}">${p['Name']}</option>`)).join('');

  return `<div class="section"><div class="section-title">🧾 Order History</div>
    <div class="filter-row">
      <select id="ohCustomer" onchange="renderOrderHistoryResults()">${custOptions}</select>
      <select id="ohProduct" onchange="renderOrderHistoryResults()">${prodOptions}</select>
    </div>
    <div id="orderHistoryResults"></div>
  </div>`;
}
function renderOrderHistoryResults(){
  const priceMap=buildPriceMap(DATA.products);
  const custSel=document.getElementById('ohCustomer');
  const prodSel=document.getElementById('ohProduct');
  const cust=custSel?custSel.value:'';
  const prod=prodSel?prodSel.value:'';

  let orders=DATA.orders.filter(o=>
    (!cust||o['Customer Name'].toLowerCase()===cust.toLowerCase()) &&
    (!prod||o['Product Name'].toLowerCase()===prod.toLowerCase())
  );
  orders.sort((a,b)=>{
    const da=parseDate(a['Order Date']),db=parseDate(b['Order Date']);
    return(db?db.getTime():0)-(da?da.getTime():0);
  });

  let summaryHTML='';
  if(cust){
    const totalOrders=distinctOrderCount(orders);
    const totalRevenue=orders.reduce((s,o)=>s+lineAmount(o,priceMap),0);
    const lastDate=orders.length?parseDate(orders[0]['Order Date']):null;
    summaryHTML=`<div class="history-summary">
      <div><span class="hs-label">Total Orders</span><span class="hs-value">${totalOrders}</span></div>
      <div><span class="hs-label">Total Revenue</span><span class="hs-value">${inr(totalRevenue)}</span></div>
      <div><span class="hs-label">Last Order</span><span class="hs-value">${lastDate?fmtDate(lastDate):'—'}</span></div>
    </div>`;
  }

  const rows=orders.map(o=>{
    const paid=(o['Payment Date']&&o['Payment Date'].trim())?pill('Paid','green'):pill('Pending','amber');
    return[o['Order Id']||'—',`<strong>${o['Customer Name']}</strong>`,o['Product Name'],o['Qty'],fmtDate(parseDate(o['Order Date'])),fmtDate(parseDate(o['Delivery Date'])),paid,inr(lineAmount(o,priceMap))];
  });
  const tableHTML=renderTable(['Order Id','Customer','Product','Qty','Order Date','Delivery Date','Payment','Amount'],rows,{emptyText:'No orders match this filter.'});

  const resultsEl=document.getElementById('orderHistoryResults');
  if(resultsEl) resultsEl.innerHTML=summaryHTML+tableHTML;
}

/* ===================== TAB SWITCHING ===================== */
function switchTab(tab){
  document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+tab));
}

/* ===================== INIT ===================== */
async function init(){
  const app=document.getElementById('app');
  const btn=document.getElementById('refreshBtn');
  btn.disabled=true; btn.textContent='⟳ Loading…';
  document.getElementById('today-date').textContent=today.toLocaleDateString('en-IN',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  app.innerHTML='<div class="loading"><div class="spinner"></div>Fetching latest data…</div>';
  historyIdCounter=0;

  try{
    const[customers,products,orders,settings]=await Promise.all([
      fetchCSV(SHEET_TABS.customers),
      fetchCSV(SHEET_TABS.products),
      fetchCSV(SHEET_TABS.orders),
      fetchCSV(SHEET_TABS.settings).catch(()=>[])
    ]);
    DATA={customers,products,orders,settings};

    document.getElementById('last-updated').textContent='Last refreshed: '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});

    let opsHTML,misHTML,custHTML,prodHTML,histHTML;
    try{opsHTML=renderOperations();}catch(e){opsHTML='<div class="error-msg">Operations error: '+e.message+'</div>';}
    try{misHTML=renderMIS();}catch(e){misHTML='<div class="error-msg">MIS error: '+e.message+'</div>';}
    try{custHTML=renderCustomers();}catch(e){custHTML='<div class="error-msg">Customers error: '+e.message+'</div>';}
    try{prodHTML=renderProducts();}catch(e){prodHTML='<div class="error-msg">Products error: '+e.message+'</div>';}
    try{histHTML=renderOrderHistoryTab();}catch(e){histHTML='<div class="error-msg">Order History error: '+e.message+'</div>';}

    app.innerHTML=`
      <div class="panel active" id="panel-operations">${opsHTML}</div>
      <div class="panel" id="panel-mis">${misHTML}</div>
      <div class="panel" id="panel-customers">${custHTML}</div>
      <div class="panel" id="panel-products">${prodHTML}</div>
      <div class="panel" id="panel-history">${histHTML}</div>`;

    filterCustomersTable('all');
    renderOrderHistoryResults();
  }catch(e){
    app.innerHTML=`<div class="error-msg">⚠️ Could not load data. Check your internet connection and that the Google Sheet is published to web.<br><small>${e.message}</small></div>`;
    document.getElementById('last-updated').textContent='Failed to load';
  }finally{
    btn.disabled=false; btn.textContent='⟳ Refresh';
  }
}

init();
</script>
